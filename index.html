<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="scene">

    <!-- LOGO -->
    <img class="titulo-logo" src="img/logo.png" alt="logo">

    <!-- BOTONES -->
    <img id="btn1" src="img/btn1.png" alt="boton 1">
    <img id="btn2" src="img/btn2.png" alt="boton 2">
    <img id="btn3" src="img/btn3.png" alt="boton 3">

    <!-- MODELO 3D -->
    <model-viewer
      id="modelo"
      class="modelo"
      src="modelo.glb"
      camera-controls
    </model-viewer>

  </div>

  <script src="script.js"></script>

</body>

</html>
