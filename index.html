<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="scene">

    <!-- LOGO -->
    <img class="titulo-logo" src="img/logo.png" alt="logo">

    <!-- BOTONES -->
    <img id="btn1" src="img/btn1.png" alt="boton 1">
    <img id="btn2" src="img/btn2.png" alt="boton 2">
    <img id="btn3" src="img/btn3.png" alt="boton 3">

    <!-- MODELO 3D (CENTRADO FIJO) -->
    <model-viewer
  id="modelo"
  class="modelo"
  src="modelo.glb"
  camera-controls
  disable-pan
  interaction-prompt="none"
  min-field-of-view="5deg"
  max-field-of-view="90deg"
  field-of-view="40deg"
  camera-orbit="0deg 58deg 130%"
  camera-target="0m 0.25m 0m"
  exposure="1.3"
  shadow-intensity="1"
  environment-image="neutral">
  </model-viewer>

  </div>

  <script src="script.js"></script>

</body>

</html>
